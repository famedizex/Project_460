<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เข้าสู่ระบบ — StudyAI Planner</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Serif+Display:ital@0;1&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root { --bg: #f7f5f0; --bg1: #ffffff; --bg2: #f0ede8; --bg3: #e8e4dd; --ink: #1a1814; --ink2: #4a4640; --ink3: #9a948c; --accent: #c8502a; --accent2: #e8a882; --green: #2d6a4f; --green-l: #d8f3dc; --muted: #c8c4bc; --font: 'DM Sans', sans-serif; --serif: 'DM Serif Display', serif; --mono: 'Fira Code', monospace; --r: 12px; --r-lg: 18px; }
html { scroll-behavior: smooth }
body { background: var(--bg); color: var(--ink); font-family: var(--font); min-height: 100vh; font-size: 15px; line-height: 1.6; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem 1.5rem; }
body::after { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E"); pointer-events: none; z-index: 9999; opacity: 0.4; }
.brand-wrap { display: flex; align-items: center; gap: 14px; margin-bottom: 2.5rem; animation: slideDown 0.6s cubic-bezier(0.16,1,0.3,1) both; }
.brand-mark { width: 44px; height: 44px; border-radius: 12px; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 1.3rem; flex-shrink: 0; box-shadow: 3px 3px 0 #8a2c12; }
.brand-name { font-family: var(--serif); font-size: 1.7rem; letter-spacing: -0.5px; line-height: 1 }
.brand-name em { color: var(--accent); font-style: normal }
.brand-sub { font-size: 0.72rem; font-family: var(--mono); color: var(--ink3); margin-top: 3px; letter-spacing: 1px }
.card { background: var(--bg1); border: 1.5px solid var(--bg3); border-radius: var(--r-lg); padding: 2.25rem 2.5rem; box-shadow: 4px 4px 0 var(--bg2); width: 100%; max-width: 420px; animation: slideUp 0.5s cubic-bezier(0.16,1,0.3,1) both; }
.card-head { margin-bottom: 2rem }
.card-title { font-family: var(--serif); font-size: 1.6rem; letter-spacing: -0.5px; margin-bottom: 4px }
.card-title em { color: var(--accent); font-style: normal }
.card-sub { font-size: 0.82rem; color: var(--ink3) }
.field { margin-bottom: 1.25rem }
.field-label { display: block; font-family: var(--mono); font-size: 0.6rem; color: var(--ink3); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 0.55rem; }
.field-input-wrap { position: relative }
.field-icon { position: absolute; left: 0.9rem; top: 50%; transform: translateY(-50%); font-size: 0.95rem; pointer-events: none; opacity: 0.5; }
input[type=email], input[type=password], input[type=text] { width: 100%; background: var(--bg); border: 1.5px solid var(--bg3); border-radius: var(--r); padding: 0.7rem 0.9rem 0.7rem 2.5rem; color: var(--ink); font-family: var(--font); font-size: 0.88rem; outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(200,80,42,0.1); }
.pw-toggle { position: absolute; right: 0.9rem; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 0.85rem; color: var(--ink3); padding: 2px 4px; border-radius: 4px; transition: color 0.2s; }
.pw-toggle:hover { color: var(--ink) }
.check-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.75rem; }
.check-label { display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none }
.check-box { width: 17px; height: 17px; border-radius: 5px; border: 1.5px solid var(--muted); background: var(--bg); display: flex; align-items: center; justify-content: center; transition: all 0.15s; flex-shrink: 0; }
.check-input { display: none }
.check-input:checked + .check-box { background: var(--accent); border-color: var(--accent) }
.check-input:checked + .check-box::after { content: '✓'; font-size: 0.7rem; color: #fff; font-weight: 700 }
.check-text { font-size: 0.82rem; color: var(--ink2) }
.forgot-link { font-size: 0.8rem; font-family: var(--mono); color: var(--ink3); text-decoration: none; letter-spacing: 0.5px; transition: color 0.2s; }
.forgot-link:hover { color: var(--accent) }
.btn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 0.8rem 1.75rem; border-radius: 50px; font-family: var(--font); font-size: 0.9rem; font-weight: 600; cursor: pointer; border: none; transition: all 0.18s; }
.btn-primary { background: var(--accent); color: #fff; box-shadow: 2px 2px 0 #8a2c12 }
.btn-primary:hover { transform: translate(-1px,-1px); box-shadow: 3px 3px 0 #8a2c12 }
.btn-primary:active { transform: translate(1px,1px); box-shadow: 1px 1px 0 #8a2c12 }
.btn-primary:disabled { opacity: 0.35; cursor: not-allowed; transform: none; box-shadow: none }
.btn-social { background: var(--bg1); border: 1.5px solid var(--bg3); color: var(--ink2); box-shadow: 2px 2px 0 var(--bg2); }
.btn-social:hover { transform: translate(-1px,-1px); box-shadow: 3px 3px 0 var(--bg2); border-color: var(--muted) }
.btn-social:active { transform: translate(1px,1px); box-shadow: 1px 1px 0 var(--bg2) }
.or-divider { display: flex; align-items: center; gap: 14px; color: var(--ink3); font-size: 0.72rem; font-family: var(--mono); letter-spacing: 1.5px; margin: 1.5rem 0; }
.or-divider::before,.or-divider::after { content: ''; flex: 1; height: 1px; background: var(--muted) }
.auth-footer { text-align: center; margin-top: 1.75rem; padding-top: 1.5rem; border-top: 1.5px solid var(--bg2); font-size: 0.82rem; color: var(--ink3); }
.auth-footer a { color: var(--accent); text-decoration: none; font-weight: 600 }
.err-box, .ok-box { display: none; padding: 0.75rem 1rem; font-size: 0.82rem; border-radius: var(--r); margin-bottom: 1.25rem; }
.err-box { background: #fde8e8; border: 1.5px solid #f0b0b0; color: #8a2c12; }
.ok-box { background: var(--green-l); border: 1.5px solid #a8d8b4; color: var(--green); }
.page-footer { margin-top: 2rem; text-align: center; font-family: var(--mono); font-size: 0.65rem; color: var(--ink3); letter-spacing: 0.5px; animation: slideUp 0.6s 0.2s cubic-bezier(0.16,1,0.3,1) both; }
.page-footer a { color: var(--ink3); text-decoration: none }
.page-footer a:hover { color: var(--accent) }
@keyframes slideDown { from { opacity: 0; transform: translateY(-14px) } to { opacity: 1; transform: translateY(0) } }
@keyframes slideUp   { from { opacity: 0; transform: translateY(10px)  } to { opacity: 1; transform: translateY(0) } }
</style>
<link rel="icon" href="data:,">
</head>
<body>
  <div class="brand-wrap">
    <div class="brand-mark">🎯</div>
    <div><div class="brand-name">Study<em>AI</em></div><div class="brand-sub">// syllabus planner</div></div>
  </div>
  <div class="card">
    <div class="card-head">
      <div class="card-title">ยินดีต้อนรับ<em>กลับ</em></div>
      <div class="card-sub">เข้าสู่ระบบเพื่อจัดการตารางเรียนของคุณ</div>
    </div>
    <button class="btn btn-social" onclick="loginWithGoogle()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg> ดำเนินการต่อด้วย Google</button>
    <div class="or-divider">หรือ</div>
    <div class="err-box" id="errBox"></div>
    <div class="ok-box"  id="okBox"></div>
    <form id="loginForm" onsubmit="handleLogin(event)" novalidate>
      <div class="field"><label class="field-label" for="email">อีเมล</label><div class="field-input-wrap"><span class="field-icon">✉</span><input type="email" id="email" name="email" placeholder="yourname@example.com" autocomplete="email" required></div></div>
      <div class="field"><label class="field-label" for="password">รหัสผ่าน</label><div class="field-input-wrap"><span class="field-icon">🔒</span><input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required><button type="button" class="pw-toggle" id="pwToggle" onclick="togglePw('password','pwToggle')">👁</button></div></div>
      <div class="check-row"><label class="check-label"><input type="checkbox" class="check-input" id="remember"><div class="check-box"></div><span class="check-text">จดจำฉันไว้</span></label><a href="#" onclick="forgotPassword(event)" class="forgot-link">ลืมรหัสผ่าน?</a></div>
      <button type="submit" class="btn btn-primary" id="submitBtn">เข้าสู่ระบบ →</button>
    </form>
    <div class="auth-footer">ยังไม่มีบัญชี? <a href="register.html">สมัครสมาชิก</a></div>
  </div>
  <div class="page-footer"><a href="studyai-planner.html">← กลับหน้าหลัก</a> &nbsp;·&nbsp; StudyAI Planner v1.0</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
import { firebaseConfig } from "./firebase-config.js";

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

window.togglePw = function(i, b) { const input=document.getElementById(i), btn=document.getElementById(b); if(input.type==='password'){input.type='text';btn.textContent='🙈'}else{input.type='password';btn.textContent='👁'} }
window.showErr = function(msg) { const e=document.getElementById('errBox'); e.textContent='⚠️ '+msg; e.style.display='block'; document.getElementById('okBox').style.display='none' }
window.showOk = function(msg) { const e=document.getElementById('okBox'); e.textContent='✓ '+msg; e.style.display='block'; document.getElementById('errBox').style.display='none' }
window.clearMsg = function() { document.getElementById('errBox').style.display='none'; document.getElementById('okBox').style.display='none' }

window.loginWithGoogle = async function() { 
  window.clearMsg();
  try {
    if (firebaseConfig.apiKey === "YOUR_API_KEY") throw new Error("CONFIG_MOCK");
    await signInWithPopup(auth, provider);
    window.showOk('ล็อกอินด้วย Google สำเร็จ! กำลังไปหน้าหลัก...');
    setTimeout(()=>{window.location.href='studyai-planner.html'},1200);
  } catch(e) {
    if (e.message === "CONFIG_MOCK") {
        window.showErr('กรุณาตั้งค่าข้อมูล Firebase ก่อนใช้งาน (ในไฟล์ firebase-config.js)');
    } else {
        window.showErr('ยกเลิกหรือเกิดข้อผิดพลาดในการล็อกอินด้วย Google');
    }
  }
}

window.forgotPassword = async function(e) {
    e.preventDefault();
    window.clearMsg();
    const email = document.getElementById('email').value.trim();
    if(!email) { window.showErr('กรุณากรอกอีเมลในช่องด้านบน เพื่อส่งลิงก์รีเซ็ตรหัสผ่าน'); return; }
    try {
        if (firebaseConfig.apiKey === "YOUR_API_KEY") throw new Error("CONFIG_MOCK");
        await sendPasswordResetEmail(auth, email);
        window.showOk('ส่งลิงก์ตั้งรหัสผ่านใหม่ไปยังอีเมลของคุณแล้ว');
    } catch (error) {
        if (error.message === "CONFIG_MOCK") {
            window.showErr('กรุณาตั้งค่าข้อมูล Firebase ก่อนใช้งาน');
        } else {
            window.showErr('ไม่พบอีเมลนี้ในระบบ หรือเกิดข้อผิดพลาด');
        }
    }
}

window.handleLogin = async function(e) { 
  e.preventDefault(); 
  window.clearMsg(); 
  const email=document.getElementById('email').value.trim();
  const password=document.getElementById('password').value;
  const btn=document.getElementById('submitBtn'); 
  
  if(!email){window.showErr('กรุณาระบุอีเมล');return} 
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){window.showErr('รูปแบบอีเมลไม่ถูกต้อง');return} 
  if(!password){window.showErr('กรุณาระบุรหัสผ่าน');return} 
  
  btn.disabled=true; 
  btn.textContent='⏳ กำลังเข้าสู่ระบบ...'; 
  
  try {
    if (firebaseConfig.apiKey === "YOUR_API_KEY") {
      throw new Error("CONFIG_MOCK");
    }
    await signInWithEmailAndPassword(auth, email, password);
    window.showOk('เข้าสู่ระบบสำเร็จ! กำลังพาไปยังหน้าหลัก...'); 
    setTimeout(()=>{window.location.href='studyai-planner.html'},1200);
  } catch (error) {
    console.error(error);
    btn.disabled=false; 
    btn.textContent='เข้าสู่ระบบ →';
    if (error.message === "CONFIG_MOCK") {
      window.showErr('กรุณาตั้งค่าข้อมูล Firebase ของคุณจริงในไฟล์ firebase-config.js ก่อนเปิดใช้งานจริงครับ');
    } else if (error.code === 'auth/invalid-credential' || error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password') {
      window.showErr('อีเมลหรือรหัสผ่านไม่ถูกต้อง');
    } else {
      window.showErr('ไม่สามารถล็อกอินได้: ' + error.message);
    }
  } 
}
</script>
</body>
</html>
